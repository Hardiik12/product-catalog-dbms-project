services:
  # ── 1. NODE.JS EXPRESS API GATEWAY ──────────────────────────────────────────
  - type: web
    name: vectorcart-node-gateway
    runtime: docker
    dockerContext: backend-node-gateway
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 8000
      - key: SPRINGBOOT_URL
        value: http://vectorcart-springboot:8080
      - key: FASTAPI_URL
        value: http://vectorcart-fastapi:5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        value: supersecretjwtkeyvectorcart2026

  # ── 2. FASTAPI BACKEND (MONGODB & AI VECTOR SEARCH) ─────────────────────────
  - type: web
    name: vectorcart-fastapi
    runtime: docker
    dockerContext: fastapi-backend
    dockerfilePath: Dockerfile
    envVars:
      - key: SPRINGBOOT_URL
        value: http://vectorcart-springboot:8080
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        value: supersecretjwtkeyvectorcart2026

  # ── 3. SPRING BOOT BACKEND (RELATIONAL DBMS) ────────────────────────────────
  - type: web
    name: vectorcart-springboot
    runtime: docker
    dockerContext: springboot-backend/backend
    dockerfilePath: Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        value: supersecretjwtkeyvectorcart2026

  # ── 4. REACT FRONTEND ───────────────────────────────────────────────────────
  - type: web
    name: vectorcart-frontend
    runtime: docker
    dockerContext: frontend-react/frontend-react
    dockerfilePath: Dockerfile
